name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: >
            username=${{ github.repository_owner }}&theme=tokyonight
            &rank_icon=github&hide_border=false&include_all
            &hide=stars,prs,issues&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >
            username=${{ github.repository_owner }}
            &layout=donut-vertical&theme=tokyonight&hide_border=false
            &size_weight=0.7&count_weight=0.3&hide_title=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate minishell pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=KrunchiZ&repo=minishell&theme=tokyonight
          path: profile/minishell-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate fdf pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=KrunchiZ&repo=fdf&theme=tokyonight
          path: profile/fdf-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate kyouth-job-listing-profiler pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: >
            username=KrunchiZ&repo=kyouth-job-listing-profiler&theme=tokyonight
          path: profile/kyouth-job-listing-profiler-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
